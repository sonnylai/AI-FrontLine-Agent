<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI FrontLine Agent — Techcombank</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── Login Screen ───────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">TCB <span style="color:#1a1a2e">AI FrontLine</span></div>
      <div class="subtitle">Sales Assistant — Dành cho chuyên viên tư vấn</div>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Mã chuyên viên</label>
        <input id="input-rep-id" type="text" placeholder="REP-001" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input id="input-password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button id="btn-login" class="btn-primary" type="submit">Đăng nhập</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>
</div>

<!-- ── Main App ───────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <span class="red">TCB</span> AI FrontLine Agent
    </div>
    <div class="header-right">
      <span id="rep-name"></span>
      <button id="btn-logout" class="btn-logout">Đăng xuất</button>
    </div>
  </header>

  <!-- Two panels -->
  <div class="panels">

    <!-- Left: Chat panel -->
    <div class="chat-panel">

      <!-- Customer selector -->
      <div class="customer-bar">
        <input id="customer-input" type="text" placeholder="Mã khách hàng (VD: CUST-001)" />
        <button id="btn-load" class="btn-load">Tải</button>
        <span id="session-badge" class="session-badge"></span>
      </div>

      <!-- Messages -->
      <div id="chat-messages" class="chat-messages"></div>

      <!-- Input -->
      <div class="chat-input-area">
        <textarea
          id="chat-textarea"
          placeholder="Đặt câu hỏi về sản phẩm, hợp đồng, hoặc tư vấn... (Enter để gửi)"
          rows="1"
          disabled
        ></textarea>
        <button id="btn-send" class="btn-send" disabled>Gửi</button>
      </div>

    </div>

    <!-- Right: Customer 360 panel -->
    <div id="c360-panel" class="c360-panel"></div>

  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
